name: HolisticHealth
options:
  bundleIdPrefix: com.holistichealth
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GCC_WARN_UNUSED_VARIABLE: YES

targets:
  HolisticHealth:
    type: application
    platform: iOS
    sources:
      - path: HolisticHealth
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.holistichealth.app
        PRODUCT_NAME: HolisticHealth
        INFOPLIST_KEY_CFBundleDisplayName: Holistic Health
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_NSCameraUsageDescription: "Holistic Health uses the camera so you can capture meal photos and acne flare photos for optional AI-assisted review. Photos are processed for analysis and are not stored by default."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Holistic Health lets you upload meal or menu photos from your library for optional AI-assisted macro estimation."
        TARGETED_DEVICE_FAMILY: "1"

  HolisticHealthTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HolisticHealthTests
    dependencies:
      - target: HolisticHealth
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.holistichealth.app.tests

schemes:
  HolisticHealth:
    build:
      targets:
        HolisticHealth: all
        HolisticHealthTests: [test]
    test:
      targets:
        - HolisticHealthTests
